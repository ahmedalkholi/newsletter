<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="flex justify-between items-center px-4 py-4 md:px-10 lg:px-24 relative shadow-sm shadow-slate-300">
        <h1 class="text-green-700 text-lg md:text-2xl lg:text-3xl font-bold">Newsletter</h1>
        <div id="menu-container" class="bg-white sm:bg-transparent items-center sm:gap-6 md:8 lg:gap-16 text-center px-7 transition-all duration-700 invisible -translate-x-full sm:-translate-x-0 sm:visible sm:flex flex-col sm:flex-row sm:text-left sm:static absolute right-0 top-16 w-full sm:w-fit z-50">
            <ul class="flex items-center gap-8 mb-8 sm:mb-0 sm:gap-4 md:gap-6 lg:gap-8 sm:flex-row sm:text-left flex-col text-center">
                <li class="cursor-pointer text-xs md:text-base font-bold hover:text-green-700 transition-all duration-200">How it works</li>
                <li class="cursor-pointer text-xs md:text-base font-bold hover:text-green-700 transition-all duration-200">Why Newsletterapp</li>
                <li class="cursor-pointer text-xs md:text-base font-bold hover:text-green-700 transition-all duration-200">Pricing</li>
                <li class="cursor-pointer text-xs md:text-base font-bold hover:text-green-700 transition-all duration-200">Blog</li>
            </ul>
            <button class="border-2 text-green-700 rounded-full px-8 py-1 max-h-fit cursor-pointer hover:bg-green-700 hover:text-white transition-all duration-200">LogIn</button>
        </div>
        <div class="cursor-pointer flex sm:hidden text-2xl" id="menu">☰</div>
    </header>
</body>
<script src="main.js"></script>
</html>
